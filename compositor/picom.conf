# ===========================
# Picom compositor configuration
# Used for window shadows, transparency, and effects
# Backend: X11 (xrender)
# ===========================

# ---------------------------
# Shadows
# ---------------------------
shadow = true               # Enable window shadows
#shadow-radius = 7          # Shadow blur radius
#shadow-opacity = 0.75      # Shadow opacity
#shadow-offset-x = -15      # X offset for shadows
#shadow-offset-y = -15      # Y offset for shadows
#shadow-red = 0             # Shadow color red component
#shadow-green = 0           # Shadow color green component
#shadow-blue = 0            # Shadow color blue component
#shadow-color = "#000000"   # Shadow color hex
#shadow-exclude = [
#  "name = 'Notification'",         # Exclude notifications
#  "class_g = 'Conky'",            # Exclude Conky
#  "class_g ?= 'Notify-osd'",      # Exclude Notify-osd
#  "class_g = 'Cairo-clock'",      # Exclude Cairo-clock
#  "_GTK_FRAME_EXTENTS@:c"
#];
#shadow-exclude-reg = ""
#xinerama-shadow-crop = false      # Prevent shadows being cut on multi-monitor

# ---------------------------
# Fading
# ---------------------------
fading = false               # Disable window fading
#fade-in-step = 0.028        # Fading speed in
#fade-out-step = 0.03        # Fading speed out
#fade-delta = 10
#fade-exclude = []
#no-fading-openclose = false
#no-fading-destroyed-argb = false

# ---------------------------
# Transparency / Opacity
# ---------------------------
inactive-opacity = 0.8       # Opacity of inactive windows
frame-opacity = 0.7          # Opacity of window frame
inactive-opacity-override = false
#active-opacity = 1.0
#inactive-dim = 0.0
focus-exclude = ["class_g = 'Cairo-clock'"]   # Ignore opacity for Cairo-clock
opacity-rule = [
    "68:class_g = 'st-256color' && focused",   # Terminal focused opacity
    "68:class_g = 'st-256color' && !focused"  # Terminal unfocused opacity
]

# ---------------------------
# Corners
# ---------------------------
corner-radius = 0             # No rounded corners
rounded-corners-exclude = [   # Exclude docks and desktop windows
    "window_type = 'dock'",
    "window_type = 'desktop'"
]

# ---------------------------
# Background blurring
# ---------------------------
#blur-method =
#blur-size = 12
#blur-deviation = false
#blur-strength = 5
#blur-background = false
#blur-background-frame = false
#blur-background-fixed = false
#blur-kern = "3x3box"
#blur-background-exclude = [
#  "window_type = 'dock'",
#  "window_type = 'desktop'",
#  "_GTK_FRAME_EXTENTS@:c"
#];

# ---------------------------
# General settings
# ---------------------------
backend = "xrender"           # Rendering backend (xrender for X11)
vsync = false                  # Disable VSync
mark-wmwin-focused = true
mark-ovredir-focused = true
detect-rounded-corners = true
detect-client-opacity = true
refresh-rate = 0               # Auto refresh
detect-transient = true
detect-client-leader = true
use-damage = true
log-level = "warn"             # Logging level for troubleshooting

# ---------------------------
# Window type settings
# ---------------------------
wintypes:
{
  tooltip        = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock           = { shadow = false; };
  dnd            = { shadow = false; };
  popup_menu     = { opacity = 0.8; };
  dropdown_menu  = { opacity = 0.8; };
}
