[module/bspwm]
type = internal/bspwm

label-empty = " %name% "
label-empty-underline = ${color.line}
label-empty-foreground = ${color.foreground-alt}
label-empty-background = ${color.background}

label-occupied = " %name% "
label-occupied-underline = ${color.line}
label-occupied-background = ${color.background}

label-focused = " %name% "
label-focused-underline = ${color.line-alt}
label-focused-foreground = ${color.foreground-red}
label-focused-background = ${color.hover}
