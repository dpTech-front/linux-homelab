[bar/main]
monitor = LVDS-1
wm-restack = bspwm

width = 99.8%
height = 25
offset-x = 0.5%
offset-y = 0.3%

line-size = 2
background = ${color.transparent}

font-0 = "Hack-Regular:size=10.5;2"
font-1 = "IPAGothic,IPAゴシック:size=10.5;2"
font-2 = "Iosevka Nerd Font:size=15;4"

modules-left = bspwm
modules-right = date after_date time glyph_last
